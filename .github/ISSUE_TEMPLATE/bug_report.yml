name: Bug report
description: Report a reproducible problem in asbflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide minimal steps or code snippet.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: asbflow version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11"
