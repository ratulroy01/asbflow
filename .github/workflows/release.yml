name: Release

on:
  push:
    branches: ["release"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run formatting checks
        run: |
          black --check src test
          isort --check-only src test

      - name: Run unit tests
        run: pytest -q test/unit

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m build
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: asbflow-release-dist
          path: dist/

  create-tag:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from pyproject
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          tag_name = f"v{version}"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag_name={tag_name}\n")
          PY

      - name: Create and push tag if missing
        id: tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          if [ -z "$TAG_NAME" ]; then
            echo "TAG_NAME is empty. Check version extraction step outputs."
            exit 1
          fi

          git fetch --tags --force

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "created=true" >> "$GITHUB_OUTPUT"

  publish-auto:
    runs-on: ubuntu-latest
    needs: [build, create-tag]
    if: github.event_name == 'push' && needs.create-tag.outputs.created == 'true'
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: asbflow-release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-manual:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: asbflow-release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
