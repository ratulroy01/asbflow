name: Dev CI

on:
  push:
    branches: ["dev"]
    paths:
      - "src/**"
      - "test/**"
      - "pyproject.toml"
      - ".github/workflows/dev.yml"
  pull_request:
    branches: ["dev"]
    paths:
      - "src/**"
      - "test/**"
      - "pyproject.toml"
      - ".github/workflows/dev.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run formatting checks
        run: |
          black --check src test
          isort --check-only src test

      - name: Run unit tests
        run: pytest -q test/unit
